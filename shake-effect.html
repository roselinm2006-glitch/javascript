<button id="btn">Click Me</button>
<script>
    let btn = document.getElementById("btn");
    btn.addEventListener("click", function () {
        btn.style.transform = "translateX(-5px)";
        setTimeout(() => {
            btn.style.transform = "translateX(5px)";
        }, 100);
        setTimeout(() => {
            btn.style.transform = "translateX(0)";
        }, 200);
    });
</script>
